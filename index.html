<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="%VITE_LIGA_COLOR%" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="%VITE_LIGA_NOMBRE%" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-R36HN8Q2YV"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-R36HN8Q2YV');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Variable global para capturar actualizacion aunque React no haya montado aun
      window.__swPendingReg = null;

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          function notificarActualizacion() {
            window.__swPendingReg = reg;
            window.dispatchEvent(new CustomEvent('swUpdateAvailable', { detail: reg }));
          }

          // Si ya hay un SW esperando al cargar (tab reabierta con version nueva)
          if (reg.waiting) notificarActualizacion();

          // Detectar cuando se instala un nuevo SW
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                notificarActualizacion();
              }
            });
          });

          // Chequear actualizacion cada 60 segundos (para apps que quedan abiertas)
          setInterval(() => reg.update(), 60000);

          // Chequear cuando el usuario vuelve a la app
          document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') reg.update();
          });
        });

        // Cuando el SW activo cambia (tras skipWaiting), recargar la pagina
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          window.location.reload();
        });
      }
    </script>
  </body>
</html>
